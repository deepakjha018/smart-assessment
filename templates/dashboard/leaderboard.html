{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2 class="mb-4 text-center">🏆 Leaderboard</h2>

<div class="card p-4">

<table class="table table-dark table-hover">

<thead>
<tr>
<th>Rank</th>
<th>User</th>
<th>Average Score</th>
<th>Total Quizzes</th>
</tr>
</thead>

<tbody>

{% for user in leaderboard %}

<tr>
<td>{{ forloop.counter }}</td>
<td>{{ user.user__username }}</td>
<td>{{ user.avg_score|floatformat:2 }}%</td>
<td>{{ user.total_quizzes }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
